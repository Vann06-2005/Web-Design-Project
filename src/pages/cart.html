<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITZONE - Shopping Cart</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../components/navbar.css" />
    <link rel="stylesheet" href="../css/cart.css" />
  </head>
  <body>
    <script src="../components/navbar.js"></script>
    <div class="container">
      <h1 class="cart-header-title">Cart</h1>

      <div id="custom-builds-section">
        <div id="custom-builds"></div>
      </div>

      <div id="regular-section">
        <h2 class="section-label-title" id="regular-label">Regular Orders</h2>
        <div class="cart-wrapper" id="cart-items"></div>
      </div>

      <div class="summary-card">
        <div class="subtotal-row">
          <span>SubTotal :</span>
          <span id="grand-total">$0</span>
        </div>
        <hr />
        <div class="checkout-container">
          <button
            class="checkout-btn"
            onclick="window.location.href = 'payment.html'"
          >
            Checkout
          </button>
        </div>
      </div>
    </div>

    <script src="../js/cart.js"></script>
    <script src="../js/cart-page.js"></script>
  </body>
</html>
