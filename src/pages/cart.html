<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/cart.css">
    <title>ITZONE - Shopping Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        
    </style>
</head>
<body class="p-4 md:p-8">
    <script src="../components/navbar.js"></script>
    <main class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 border-b border-gray-700 pb-2">Cart</h1>

        <div class="card-bg p-6 mb-8">
            <div id="cart-items" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                </div>
        </div>

        <div class="bg-gray-200 rounded-xl p-8 text-black text-center max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6 text-2xl font-bold px-4">
                <span>SubTotal :</span>
                <span id="subtotal">$0</span>
            </div>
            <button class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-16 rounded-lg text-xl transition-all w-full md:w-auto">
                Checkout
            </button>
        </div>
    </main>

    <script>
        // Initial Product Data based on your image
        let cart = [
            { id: 1, name: "AMD Ryzen 57000X", price: 230, qty: 0, img: "../Image/ADM.png" },
            { id: 2, name: "Motherboard: MSI PRO B650-P WiFi", price: 200, qty: 0, img: "https://placehold.co/100x100?text=MB" },
            { id: 3, name: "Memory: Corsair Vengeance 32GB", price: 120, qty: 0, img: "https://placehold.co/100x100?text=RAM" },
            { id: 4, name: "GPU: AMD Radeon RX 7900 XTX", price: 1000, qty: 0, img: "https://placehold.co/100x100?text=GPU" },
            { id: 5, name: "Case: Sapphire PURE X850A WIFI 7", price: 120, qty: 0, img: "https://placehold.co/100x100?text=CASE" },
            { id: 6, name: "RPSU: RM750x SHIFT 80 PLUS Gold", price: 110, qty: 0, img: "https://placehold.co/100x100?text=PSU" }
        ];

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;

                container.innerHTML += `
                    <div class="flex items-center border border-gray-300 rounded-lg p-4 shadow-sm">
                        <img src="${item.img}" alt="${item.name}" class="w-20 h-20 object-contain mr-4">
                        <div class="flex-grow">
                            <h3 class="font-bold text-sm md:text-base mb-2">${item.name}</h3>
                            <div class="flex items-center flex-wrap gap-4">
                                <div class="flex items-center border rounded px-2 bg-gray-50">
                                    <button onclick="updateQty(${item.id}, -1)" class="px-2 font-bold hover:text-blue-600">-</button>
                                    <input type="text" value="${item.qty}" class="w-8 text-center bg-transparent outline-none" readonly>
                                    <button onclick="updateQty(${item.id}, 1)" class="px-2 font-bold hover:text-blue-600">+</button>
                                </div>
                                <span class="font-semibold text-gray-700">Total : ${itemTotal}$</span>
                                <button onclick="removeItem(${item.id})" class="bg-red-700 text-white text-xs px-3 py-1 rounded-md hover:bg-red-800 transition">Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('subtotal').innerText = `$${total}`;
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty = Math.max(0, item.qty + change);
                renderCart();
            }
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        }

        // Initial Load
        renderCart();
    </script>
</body>
</html>
