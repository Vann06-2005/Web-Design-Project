<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITZONE - Shopping Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/cart.css">
</head>
<body>

<div class="container">
    <script src="../components/navbar.js"></script>

    <h1 class="cart-header-title">Cart</h1>

    <div class="cart-wrapper" id="cart-items">
        </div>

    <div class="summary-card">
        <div class="subtotal-row">
            <span>Total :</span>
            <span id="grand-total">$0</span>
        </div>
        <hr>
        <div class="checkout-container">
            <button class="checkout-btn" onclick="window.location.href='payment.html'">Checkout</button>
        </div>
    </div>
</div>

<script src="../js/cart.js"></script>
<script>
    let cart = getCart();

    function renderCart() {
        const container = document.getElementById('cart-items');
        let total = 0;
        container.innerHTML = '';

        cart.forEach(item => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;

            container.innerHTML += `
                <div class="cart-item">
                    <div class="img-frame">
                        <img src="${item.img}" alt="part" onerror="this.src='https://placehold.co/80'">
                    </div>
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <div class="actions">
                            <div class="qty-selector">
                                <button onclick="updateQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                            <strong class="item-total-price" >SubTotal : $${itemTotal}</strong>
                            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('grand-total').innerText = `$${total}`;
    }

    function updateQty(id, change) {
        const item = cart.find(p => p.id === id);
        if (item) {
            item.qty = Math.max(1, item.qty + change);
            saveCart(cart);
            renderCart();
        }
    }

    function removeItem(id) {
        cart = cart.filter(p => p.id !== id);
        saveCart(cart);
        renderCart();
    }

    renderCart();
</script>
</body>
</html>
