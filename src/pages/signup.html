<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Zone — Sign Up</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<main class="auth-page">

  <!-- Back Button -->
  <button class="back-btn" type="button" onclick="history.back()">
    ← Back
  </button>

  <!-- Sign Up Card -->
  <section class="auth-card" aria-labelledby="signup-title">

    <h1 id="signup-title" class="auth-title">Sign up</h1>

    <!-- Sign Up Form -->
    <form class="auth-form" id="signupForm" novalidate>

      <!-- Username Field -->
      <div class="form-group">
        <label for="username" class="visually-hidden">Username</label>
        <input
                type="text"
                id="username"
                name="username"
                placeholder="Username"
                autocomplete="username"
                required
        />
      </div>

      <!-- Email or Phone Field -->
      <div class="form-group">
        <label for="emailPhone" class="visually-hidden">Email or Phone</label>
        <input
                type="text"
                id="emailPhone"
                name="emailPhone"
                placeholder="Email / Phone"
                required
        />
      </div>

      <!-- Password Field with show/hide toggle -->
      <div class="form-group password-group">
        <label for="password" class="visually-hidden">Password</label>
        <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                autocomplete="new-password"
                required
        />
        <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
          <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="primary-btn">Sign up</button>

      <!-- Error/Success message -->
      <p class="error-message" id="errorMsg"></p>

    </form>

    <!-- Divider + Google Button -->
    <div class="divider"><span>Or</span></div>

    <button class="google-btn" type="button" aria-label="Sign up with Google">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22">
        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
        <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
      </svg>
    </button>

    <!-- Switch to Login -->
    <p class="switch-form">
      Already have an account ?
      <a href="signin.html">Login</a>
    </p>

    <!-- Footer Links -->
    <footer class="auth-footer">
      <a href="#">Terms &amp; Conditions</a>
      <a href="#">Support</a>
      <a href="#">Customer Care</a>
    </footer>

  </section>
</main>

<script src="../js/script.js"></script>
</body>
</html>
