    // ── State ──
    let currentIndex = 0;
    const selected = {};

    // ── Render product grid ──
    function renderGrid(category) {
      const grid = document.getElementById('pc-grid');
      const items = products[category] || [];
      grid.innerHTML = items.map((p, i) => `
        <div class="pc-card ${selected[category] === i ? 'selected' : ''}"
             onclick="selectProduct('${category}', ${i}, this)">
          <div class="pc-card-img-wrap">
            <img src="${p.img}" alt="${p.name}" onerror="this.parentElement.style.background='#e8e8e8'">
          </div>
          <div class="pc-card-separator"></div>
          <p class="pc-card-name">${p.name}</p>
          <div class="pc-card-bottom">
            <span class="pc-card-brand">${p.brand}</span>
            <span class="pc-card-price">${p.price}</span>
          </div>
        </div>
      `).join('');
    }

    // ── Select a product ──
    function selectProduct(category, index, el) {
      selected[category] = index;
      document.querySelectorAll('.pc-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      renderSelectedBar();
    }

    // ── Render item-selected bar ──
    function renderSelectedBar() {
      const bar = document.getElementById('selected-items');
      const entries = categories
        .filter(cat => selected[cat] !== undefined)
        .map(cat => {
          const label = categoryLabels[cat];
          const name  = products[cat][selected[cat]]?.name || '';
          return `<span class="sel-item"><strong>${label}:</strong> ${name}</span>`;
        });
      bar.innerHTML = entries.length
        ? entries.join('')
        : '<span class="sel-empty">No items selected yet.</span>';
    }

    // ── Switch active sidebar category ──
    function setActiveCategory(index) {
      currentIndex = index;
      const cat = categories[index];
      document.querySelectorAll('.pc-menu-item[data-category]').forEach(li => {
        li.classList.toggle('active', li.dataset.category === cat);
      });
      renderGrid(cat);
      updateNextButton();
      clearError();
    }

    // ── Update Next button label ──
    function updateNextButton() {
      const btn = document.getElementById('btn-next');
      btn.textContent = currentIndex === categories.length - 1
        ? 'Add all parts to cart'
        : 'Next';
    }

    // ── Error helpers ──
    function showError(msg) {
      document.getElementById('pc-error').textContent = msg;
    }
    function clearError() {
      document.getElementById('pc-error').textContent = '';
    }

    // ── Sidebar clicks ──
    document.querySelectorAll('.pc-menu-item[data-category]').forEach(li => {
      li.addEventListener('click', () => {
        const idx = categories.indexOf(li.dataset.category);
        if (idx !== -1) setActiveCategory(idx);
      });
    });

    // ── Next / Add all parts to cart button ──
    document.getElementById('btn-next').addEventListener('click', () => {
      const currentCat = categories[currentIndex];

      if (currentIndex < categories.length - 1) {
        if (selected[currentCat] === undefined) {
          showError(`Please select a ${categoryLabels[currentCat]} before proceeding.`);
          return;
        }
        clearError();
        setActiveCategory(currentIndex + 1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        const unselected = categories.filter(cat => selected[cat] === undefined);
        if (unselected.length > 0) {
          const labels = unselected.map(cat => categoryLabels[cat]).join(', ');
          showError(`Please select: ${labels}`);
          return;
        }
        categories.forEach(cat => {
          const p = products[cat][selected[cat]];
          const price = parseFloat(p.price.replace('$', ''));
          addToCart(p.name, price, p.img, null);
        });
        window.location.href = 'cart.html';
      }
    });

    // ── Init ──
    setActiveCategory(0);
  </script>
