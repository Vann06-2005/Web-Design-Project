<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Zone — Forgot Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="auth-page">

  <button class="back-btn" type="button" onclick="history.back()">← Back</button>

  <section class="auth-card" aria-labelledby="forgot-title">

    <h1 id="forgot-title" class="auth-title">Forgot Password?</h1>

    <p class="auth-body">
      No worries. We'll send you reset instructions to your email address.<br>
      Please enter your email
    </p>

    <form class="auth-form" id="forgotForm" novalidate>

      <div class="form-group">
        <label for="email" class="visually-hidden">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="example@example.com"
          required
        />
      </div>

      <button type="submit" class="primary-btn">Send Reset Link</button>

      <p class="error-message" id="errorMsg"></p>

    </form>

    <div class="divider"><span>Or</span></div>

    <button class="google-btn" type="button" aria-label="Continue with Google">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22">
        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
        <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
      </svg>
    </button>

    <p class="switch-form">
      Already have an account ?
      <a href="signin.html">Login</a>
    </p>

    <footer class="auth-footer">
      <a href="#">Terms &amp; Conditions</a>
      <a href="#">Support</a>
      <a href="#">Customer Care</a>
    </footer>

  </section>
</main>

<script>
  const form = document.getElementById('forgotForm');
  const emailInput = document.getElementById('email');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    const email = emailInput.value.trim();
    errorMsg.style.color = '#ef4444';

    if (!email) {
      errorMsg.textContent = 'Please enter your email';
      emailInput.classList.add('invalid');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorMsg.textContent = 'Please enter a valid email address';
      emailInput.classList.add('invalid');
      return;
    }

    sessionStorage.setItem('resetEmail', email);
    window.location.href = 'check-email.html';
  });

  emailInput.addEventListener('input', () => emailInput.classList.remove('invalid'));
</script>
</body>
</html>
